name: Update Stats

on:
  schedule:
    # Run every 4 hours — catches results from all daily match slots
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update stats.json
        run: node scripts/update-stats.mjs

      - name: Commit updated stats if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/stats.json
          if git diff --staged --quiet; then
            echo "No changes to stats.json — skipping commit"
          else
            git commit -m "chore: auto-update stats.json [$(date -u +%Y-%m-%d)]"
            git push
          fi
